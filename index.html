<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header><h1>{{ site.title }}</h1></header>
  <main>
    <h2>Countries</h2>
    <ul class="country-list">
      {% for c in site.countries %}
        {% assign code = c.country_code | downcase %}
        {% assign count = site.plugins | where: "country", c.country_code | size %}
        <li>
          <a href="{{ c.url }}">{{ c.title }} — {{ count }} plugin{% if count > 1 %}s{% endif %}</a>
        </li>
      {% endfor %}
    </ul>
  </main>
  <footer>Hosted on GitHub Pages</footer>
</body>
</html>
